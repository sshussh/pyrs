# Build and publish release assets when a version tag is pushed.
# Tag format: v0.7.0 (leading v required)
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build (e.g. v0.7.0); empty builds current ref only as artifact
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CMAKE_BUILD_PARALLEL_LEVEL: 2

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup PyRs toolchain
        uses: ./.github/actions/setup-pyrs
        with:
          llvm-version: "18"

      - name: Build release
        run: cargo build --release -p pyrs

      - name: Smoke-test the binary
        run: |
          set -euo pipefail
          ./target/release/pyrs -V
          ./target/release/pyrs run -i examples/fib.py | tee /tmp/fib.out
          test "$(cat /tmp/fib.out)" = "$(python3 examples/fib.py)"

      - name: Package
        id: pack
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          if [[ "$ver" != v* ]]; then
            ver="git-${GITHUB_SHA::8}"
          fi
          stage="pyrs-${ver}-x86_64-unknown-linux-gnu"
          mkdir -p "dist/${stage}"
          cp target/release/pyrs "dist/${stage}/"
          cp README.md LICENSE "dist/${stage}/" 2>/dev/null || cp README.md "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          (cd dist && sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256")
          echo "asset=${stage}.tar.gz" >> "${GITHUB_OUTPUT}"
          echo "version=${ver}" >> "${GITHUB_OUTPUT}"
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.asset }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
